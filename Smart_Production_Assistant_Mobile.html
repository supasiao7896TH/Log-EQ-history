    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #eef2f9; }
        .view { display: none; }
        .view.active { display: block; animation: viewFadeIn 0.28s ease forwards; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -400% 0; } 100% { background-position: 400% 0; } }
        .skeleton { background: linear-gradient(90deg, #d1d9e6 25%, #eef2f9 50%, #d1d9e6 75%); background-size: 400% 100%; animation: shimmer 1.6s ease-in-out infinite; border-radius: 8px; height: 14px; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(244,63,94,0.4); } 70% { box-shadow: 0 0 0 5px rgba(244,63,94,0); } }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
        .status-dot.open { background: #f43f5e; animation: pulse-dot 2s ease-in-out infinite; }
        .status-dot.in-progress { background: #f59e0b; }
        .status-dot.closed { background: #10b981; }
        .status-dot.none { background: #cbd5e1; }
        .neumorphic-card { background: #eef2f9; border-radius: 20px; box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; transition: all 0.3s ease-in-out; }
        .neumorphic-card:hover { box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; transform: translateY(2px); }
        .neumorphic-inset { background: #eef2f9; border-radius: 12px; box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff; }
        .neumorphic-button { background: #eef2f9; border-radius: 10px; box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff; transition: all 0.2s ease-in-out; }
        .neumorphic-button:hover { box-shadow: 2px 2px 5px #d1d9e6, -2px -2px 5px #ffffff; }
        .neumorphic-button:active { box-shadow: inset 3px 3px 7px #d1d9e6, inset -3px -3px 7px #ffffff; }
        .neumorphic-button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff; }
        .gradient-text { background-image: linear-gradient(to right, #3730a3, #5b21b6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 40; }
        .modal-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; }
        .toast-notification { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: bottom 0.5s ease-in-out; z-index: 100; }
        .toast-notification.show { bottom: 20px; }
        .header-bg-isometric { position: relative; background-color: #eef2f9; overflow: hidden; max-height: 432px; }
        .header-bg-isometric::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, transparent, #eef2f9); pointer-events: none; }
        @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff; } 50% { transform: scale(1.05); box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; } }
        .breathing-button { animation: breathe 4s ease-in-out infinite; }
        #command-center-table-body tr { cursor: pointer; }
        #details-container { position: relative; }
        #log-details-suggestion { position: absolute; top: 0; left: 0; color: #94a3b8; background-color: transparent; z-index: -1; white-space: pre-wrap; word-wrap: break-word; pointer-events: none; }

        /* ── Mobile Responsive ── */
        @media (max-width: 767px) {
            input, select, textarea { font-size: 16px !important; }
            .toast-notification.show { bottom: 76px; }
            .modal-container { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100% !important; max-width: 100% !important; transform: none !important; }
            .modal-container > .neumorphic-card { border-radius: 0 !important; min-height: 100dvh; max-height: 100dvh; overflow-y: auto; }
            #chatbot-modal .modal-container { top: auto !important; height: 78vh !important; min-height: unset !important; }
            #chatbot-modal .modal-container > .neumorphic-card { border-radius: 24px 24px 0 0 !important; min-height: unset !important; height: 100%; }
            .log-table-wrapper { display: none !important; }
            .log-cards-wrapper { display: block !important; }
            .cc-table-wrapper { display: none !important; }
            .cc-cards-wrapper { display: block !important; }
            body { padding-bottom: 72px; }
        }
        @media (min-width: 768px) {
            .log-table-wrapper { display: block; }
            .log-cards-wrapper { display: none; }
            .cc-table-wrapper { display: block; }
            .cc-cards-wrapper { display: none; }
            #bottom-nav { display: none !important; }
        }
        #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: #eef2f9; box-shadow: 0 -3px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: center; z-index: 40; padding: 0 4px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-width: 52px; min-height: 52px; padding: 4px 8px; border-radius: 12px; cursor: pointer; background: transparent; border: none; transition: background 0.2s; }
        .nav-item.active { background: rgba(99,102,241,0.12); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-item span { font-size: 9px; font-weight: 600; }
        .sheet-handle { width: 40px; height: 4px; background: #cbd5e1; border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
        .mobile-log-card { background: #eef2f9; border-radius: 12px; padding: 12px; box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; margin-bottom: 10px; }
    </style>
</head>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        const CONFIG = {
            appPrefix: 'spa_v17',
            get: function(key) { return `${this.appPrefix}_${key}`; },
            categoryColors: { "PUMP": "text-sky-600 border-sky-400", "AGITATOR": "text-orange-600 border-orange-400", "BLOWER, COMP.": "text-lime-600 border-lime-400", "SEPARATOR, FILTER": "text-amber-600 border-amber-400", "ROTARY VALVE": "text-rose-600 border-rose-400", "STATIC": "text-teal-600 border-teal-400", "EI": "text-violet-600 border-violet-400", "EE": "text-fuchsia-600 border-fuchsia-400", "PIPING": "text-cyan-600 border-cyan-400", "AIR KNOCKER": "text-pink-600 border-pink-400" },
            defaultEquipment: { "PUMP": ["PP-101A", "PP-101B", "PP-102A", "PP-102B", "PP-102C", "PP-103A", "PP-103B", "PP-201A", "PP-201B", "PP-304A", "PP-304B", "PP-402A", "PP-402B", "PP-404A", "PP-404B", "PP-405A", "PP-405B", "PP-406A", "PP-406B", "PP-410", "PP450", "PP-501A", "PP-501B", "PP-502A", "PP-502B", "PP-503A", "PP-503B", "PP-504A", "PP-504B", "PP-600", "PP-601A", "PP-601B", "PP-601C", "PP-603", "TP-800A", "TP-800B", "TP-802A", "TP-802B", "PP-100", "PP-901", "PP-102A-1", "PP-102B-1", "PP-102C-1", "PX-401A (SP)", "PX-401A (SC)", "PX-401A (GB)", "PX-401B (SP)", "PX-401B (SC)", "PX-401B (GB)", "PP-801", "PP-802", "PP-803", "PP-804", "PP-805"], "AGITATOR": ["PJ-101", "PJ-301", "PJ-302", "PJ-303", "PJ-304", "PJ-401", "PJ-402", "PJ-404"], "BLOWER, COMP.": ["PC-201A", "PC-201B", "PC-401", "PC-403A", "PC-403B", "PC-601", "PC-602", "PC-901"], "SEPARATOR, FILTER": ["PM-101-1", "PM-101-2", "PM-102", "PM-105", "PM-401A", "PM-401B", "PM-402A", "PM-402B", "PM-404-1", "PM-404-2", "PM-404-3", "PM-404-4", "PM-802A", "PM-802B", "PM-802C", "PM-804A", "PM-804B", "PM-804C", "PM-901", "PM-902", "PM-401D"], "ROTARY VALVE": ["PZ-100", "TZ-400", "PZ-403", "PZ-800A", "PZ-800B", "PZ-800C"], "STATIC": ["PM-500A", "PM-500B", "PM-803A", "PM-803B", "PM-803C", "PM-104", "PTK-800A", "PTK-800B", "PTK-800C", "PW-901", "TTK-400", "PE-101A", "PE-101B", "PE-101C", "PE-101D", "PE-101E", "PE-101F"], "EI": ["PG FG TG LG local", "DCS", "Control valve", "On / Off valve"], "EE": ["EE all"], "PIPING": ["Piping all"], "AIR KNOCKER": ["Air knocker all"] },
            excelDataMap: { date: 'O5', shiftDay: 'M9', shiftNight: 'M10', dayDetails: { start: 76, end: 117 }, nightDetails: { start: 119, end: 145 } }
        };

        const IDB_CONFIG = { name: 'SmartProduction_IDB', version: 2, store: 'appData' };
        const dbManager = {
            db: null,
            init: async function() { return new Promise((resolve, reject) => { const request = indexedDB.open(IDB_CONFIG.name, IDB_CONFIG.version); request.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(IDB_CONFIG.store)) { db.createObjectStore(IDB_CONFIG.store); } }; request.onsuccess = (e) => { this.db = e.target.result; this.db.onversionchange = () => { this.db.close(); }; resolve(this.db); }; request.onerror = (e) => reject(e.target.error); request.onblocked = () => reject(new Error('IndexedDB ถูกบล็อกโดย tab อื่น กรุณาปิด tab อื่นที่ใช้แอปนี้อยู่แล้วลองใหม่')); }); },
            get: async function(key) { return new Promise((resolve, reject) => { const tx = this.db.transaction(IDB_CONFIG.store, 'readonly'); const request = tx.objectStore(IDB_CONFIG.store).get(key); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); }); },
            set: async function(key, value) { return new Promise((resolve, reject) => { const tx = this.db.transaction(IDB_CONFIG.store, 'readwrite'); const request = tx.objectStore(IDB_CONFIG.store).put(value, key); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); },
            clear: async function() { return new Promise((resolve, reject) => { const tx = this.db.transaction(IDB_CONFIG.store, 'readwrite'); const request = tx.objectStore(IDB_CONFIG.store).clear(); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); }
        };

        async function migrateDataIfNeeded() {
            const isMigrated = localStorage.getItem('spa_v17_migrated_to_idb');
            if (!isMigrated) {
                const oldEq = localStorage.getItem(CONFIG.get('equipment_list'));
                if (oldEq) await dbManager.set(CONFIG.get('equipment_list'), JSON.parse(oldEq));
                for (let i = 1; i <= 3; i++) { const oldLogs = localStorage.getItem(CONFIG.get(`logs_plant_${i}`)); if (oldLogs) await dbManager.set(CONFIG.get(`logs_plant_${i}`), JSON.parse(oldLogs)); }
                localStorage.setItem('spa_v17_migrated_to_idb', 'true');
            }
        }

        const views = { mainMenu: document.getElementById('main-menu-view'), detail: document.getElementById('equipment-detail-view'), commandCenter: document.getElementById('command-center-view') };
        const plantSelector = document.getElementById('plant-selector');
        const equipmentGrid = document.getElementById('equipment-grid');
        const equipmentSearch = document.getElementById('equipment-search');
        const openManagerBtn = document.getElementById('open-manager-btn');
        const openChatbotBtn = document.getElementById('open-chatbot-btn');
        const openDashboardBtn = document.getElementById('open-dashboard-btn');
        const openCommandCenterBtn = document.getElementById('open-command-center-btn');
        const openHandoverBtn = document.getElementById('open-handover-btn');
        const toastNotification = document.getElementById('toast-notification');
        const apiKeyModal = document.getElementById('api-key-modal');
        const managerModal = document.getElementById('manager-modal');
        const chatbotModal = document.getElementById('chatbot-modal');
        const dashboardModal = document.getElementById('dashboard-modal');
        const handoverModal = document.getElementById('handover-modal');
        const imageViewerModal = document.getElementById('image-viewer-modal');
        const confirmModal = document.getElementById('confirm-modal');
        const importModal = document.getElementById('import-modal');
        const importModalTemplate = document.getElementById('import-modal-template');
        const apiKeyModalTemplate = document.getElementById('api-key-modal-template');
        const managerModalTemplate = document.getElementById('manager-modal-template');
        const chatbotModalTemplate = document.getElementById('chatbot-modal-template');
        const dashboardModalTemplate = document.getElementById('dashboard-modal-template');
        const handoverModalTemplate = document.getElementById('handover-modal-template');
        const detailTemplate = document.getElementById('equipment-detail-template');
        const commandCenterTemplate = document.getElementById('command-center-template');
        const confirmModalTemplate = document.getElementById('confirm-modal-template');

        let currentPlant = 1;
        let currentEquipmentId = null;
        let allLogs = {};
        let equipmentList = {};
        let chatHistory = [];
        let chartInstances = {};
        let currentImageFile = null;
        let excelWorkbook = null;
        let toastTimer = null;
        let currentSuggestion = '';
        let isGeminiCallInFlight = false;

        function updateBottomNav(activeId) {
            const navMap = { mainMenu: 'nav-home-btn', commandCenter: 'nav-command-btn' };
            document.querySelectorAll('#bottom-nav .nav-item').forEach(btn => {
                btn.classList.remove('active');
                btn.querySelectorAll('svg, span').forEach(el => { el.classList.remove('text-indigo-600'); el.classList.add('text-slate-500'); });
            });
            const targetId = navMap[activeId];
            if (targetId) {
                const activeBtn = document.getElementById(targetId);
                if (activeBtn) {
                    activeBtn.classList.add('active');
                    activeBtn.querySelectorAll('svg, span').forEach(el => { el.classList.remove('text-slate-500'); el.classList.add('text-indigo-600'); });
                }
            }
        }

        function sanitizeHTML(str) { const div = document.createElement('div'); div.textContent = String(str ?? ''); return div.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        const getLogStorageKey = () => CONFIG.get(`logs_plant_${currentPlant}`);
        async function loadData() { const storedLogs = await dbManager.get(getLogStorageKey()); allLogs = storedLogs ? storedLogs : {}; const storedEquipment = await dbManager.get(CONFIG.get('equipment_list')); equipmentList = storedEquipment ? storedEquipment : JSON.parse(JSON.stringify(CONFIG.defaultEquipment)); }
        const saveLogs = async () => { await dbManager.set(getLogStorageKey(), allLogs); checkNotifications(); };
        const saveEquipmentList = async () => { await dbManager.set(CONFIG.get('equipment_list'), equipmentList); };
        async function addLogEntry(eqId, entry) { if (!allLogs[eqId]) allLogs[eqId] = []; const used = new Set(allLogs[eqId].map(l => l.timestamp)); while (used.has(entry.timestamp)) { entry.timestamp++; } allLogs[eqId].unshift(entry); await saveLogs(); }
        async function deleteLogEntry(eqId, timestamp) { if (allLogs[eqId]) { allLogs[eqId] = allLogs[eqId].filter(log => log.timestamp !== timestamp); await saveLogs(); } }
        function getAllLogsFlat() { return Object.entries(allLogs).flatMap(([equipment, logs]) => logs.map(log => ({ equipment, ...log }))); }
        function stripImageField(logs) { return logs.map(({ image, ...rest }) => rest); }

        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            if (isoString.length === 10 && isoString.includes('-')) { isoString += 'T00:00'; }
            const date = new Date(isoString);
            if (isNaN(date)) return isoString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false, hourCycle: 'h23' }).format(date);
        }

        function getCurrentDateTimeLocalString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        const switchView = (viewId) => { Object.values(views).forEach(v => v.classList.remove('active')); if(views[viewId]) views[viewId].classList.add('active'); updateBottomNav(viewId); };

        function renderMainMenu(searchTerm = '') { equipmentGrid.innerHTML = ''; const lowerCaseSearchTerm = searchTerm.toLowerCase(); const getPrefixedId = (baseId) => { if (currentPlant === 1) return baseId; if (currentPlant === 2) return `2${baseId}`; if (currentPlant === 3) return `3${baseId}`; return baseId; }; for (const category in equipmentList) { const filteredEquipment = equipmentList[category].filter(baseEqId => getPrefixedId(baseEqId).toLowerCase().includes(lowerCaseSearchTerm)); if (filteredEquipment.length === 0 && searchTerm) continue; const categoryDiv = document.createElement('div'); categoryDiv.className = 'neumorphic-card p-3'; const colorClasses = CONFIG.categoryColors[category] || 'text-slate-600 border-slate-300'; const categoryTitle = document.createElement('h3'); categoryTitle.className = `font-bold text-xs mb-2 border-b-2 pb-1.5 ${colorClasses}`; categoryTitle.textContent = category.replace(/_/g, ' '); categoryDiv.appendChild(categoryTitle); const ul = document.createElement('ul'); ul.className = 'space-y-1'; (searchTerm ? filteredEquipment : equipmentList[category]).forEach(baseEqId => { const displayEqId = getPrefixedId(baseEqId); const li = document.createElement('li'); const button = document.createElement('button'); const eqLogs = allLogs[displayEqId] || []; const hasOpen = eqLogs.some(l => l.status === 'Open'); const hasIP = eqLogs.some(l => l.status === 'In Progress'); const dotCls = hasOpen ? 'open' : hasIP ? 'in-progress' : eqLogs.length > 0 ? 'closed' : 'none'; button.className = 'w-full text-left text-slate-700 hover:text-blue-600 p-1 rounded-md transition duration-200 text-xs flex items-center gap-1.5'; button.innerHTML = `<span class="status-dot ${dotCls}"></span><span>${displayEqId}</span>`; button.dataset.eqId = displayEqId; button.addEventListener('click', handleEquipmentClick); li.appendChild(button); ul.appendChild(li); }); categoryDiv.appendChild(ul); equipmentGrid.appendChild(categoryDiv); } renderLastEntry(); }

        function renderLogTable(eqId, filters = { type: 'all', status: 'all' }) {
            const logTableBody = views.detail.querySelector('#log-table-body');
            if (!logTableBody) return;
            logTableBody.innerHTML = '';
            let logs = (allLogs[eqId] || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
            if (filters.type !== 'all') { logs = logs.filter(log => log.problemType === filters.type); }
            if (filters.status !== 'all') { logs = logs.filter(log => log.status === filters.status); }
            if (logs.length === 0) { logTableBody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-slate-400"><div class="flex flex-col items-center gap-2"><svg class="w-10 h-10 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span class="text-sm">ยังไม่มีบันทึกข้อมูลสำหรับอุปกรณ์นี้</span></div></td></tr>`; renderLogCards(eqId, filters); return; }
            logs.forEach(log => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-100/80';

        async function handlePredictiveAnalysis() { const resultContainer = dashboardModal.querySelector('#predictive-result-container'); resultContainer.innerHTML = '<p class="text-center text-slate-500">กำลังพยากรณ์...</p>'; try { const allPlantLogs = getAllLogsFlat(); if (allPlantLogs.length < 10) throw new Error('ข้อมูลไม่เพียงพอที่จะพยากรณ์ (ต้องการอย่างน้อย 10 รายการ)'); const dataContext = JSON.stringify(stripImageField(allPlantLogs)); const prompt = `As a reliability engineer, analyze the following maintenance log data from Plant ${currentPlant}. Identify time-based patterns, recurring component failures, and sequential failures. Predict the top 3 pieces of equipment most likely to fail next and briefly explain your reasoning for each. Respond in Thai. Data:\n${dataContext}`; const contents = [{ role: 'user', parts: [{ text: prompt }] }]; const resultText = await callGeminiAPI(contents); resultContainer.innerHTML = `<div class="text-sm text-slate-700">${resultText.split('\n').map(line => sanitizeHTML(line)).join('<br>')}</div>`; } catch (error) { resultContainer.innerHTML = `<p class="text-center text-rose-500">เกิดข้อผิดพลาด: ${sanitizeHTML(error.message)}</p>`; } }
        async function handleOverallAnalysis() { const resultContainer = dashboardModal.querySelector('#overall-analysis-result-container'); resultContainer.innerHTML = '<p class="text-center text-slate-500">กำลังรวบรวมและวิเคราะห์ข้อมูลทั้งหมด...</p>'; try { const allPlantLogs = getAllLogsFlat(); if (allPlantLogs.length < 5) { throw new Error('ข้อมูลไม่เพียงพอที่จะวิเคราะห์ภาพรวม (ต้องการอย่างน้อย 5 รายการ)'); } const dataContext = JSON.stringify(stripImageField(allPlantLogs)); const prompt = `คุณคือวิศวกรความน่าเชื่อถือ (Reliability Engineer) อาวุโสที่กำลังวิเคราะห์ข้อมูลการซ่อมบำรุงของ Plant ${currentPlant} ทั้งหมด ข้อมูลทั้งหมดอยู่ในรูปแบบ JSON ต่อไปนี้: ${dataContext}. โปรดวิเคราะห์ข้อมูลทั้งหมดและตอบกลับในรูปแบบ JSON ที่กำหนดเท่านั้น`; const schema = { type: "OBJECT", properties: { "overall_summary": { "type": "STRING" }, "concerning_equipment": { "type": "ARRAY", "items": { "type": "OBJECT", "properties": { "equipment_id": { "type": "STRING" }, "reason": { "type": "STRING" }, "recommendation": { "type": "STRING" } }, "required": ["equipment_id", "reason", "recommendation"] } }, "positive_highlights": { "type": "STRING" } }, "required": ["overall_summary", "concerning_equipment", "positive_highlights"] }; const contents = [{ role: 'user', parts: [{ text: prompt }] }]; const resultText = await callGeminiAPI(contents, schema); const parsedJson = JSON.parse(resultText); renderOverallAnalysisResult(parsedJson); } catch (error) { resultContainer.innerHTML = `<p class="text-center text-rose-500">เกิดข้อผิดพลาด: ${error.message}</p>`; } }
        function renderOverallAnalysisResult(data) { const resultContainer = dashboardModal.querySelector('#overall-analysis-result-container'); resultContainer.innerHTML = ''; const fragment = document.createDocumentFragment(); const summaryDiv = document.createElement('div'); summaryDiv.className = 'mb-6'; summaryDiv.innerHTML = `<h4 class="font-semibold text-lg text-slate-800 mb-2">สรุปภาพรวม</h4><p class="text-slate-600 text-sm">${sanitizeHTML(data.overall_summary)}</p>`; fragment.appendChild(summaryDiv); const concerningDiv = document.createElement('div'); concerningDiv.className = 'mb-6'; concerningDiv.innerHTML = `<h4 class="font-semibold text-lg text-rose-700 mb-3">🚨 อุปกรณ์ที่ต้องจับตามองเป็นพิเศษ</h4>`; const concerningList = document.createElement('div'); concerningList.className = 'space-y-4'; if (data.concerning_equipment && data.concerning_equipment.length > 0) { data.concerning_equipment.forEach(eq => { const card = document.createElement('div'); card.className = 'p-4 rounded-lg border-l-4 border-rose-500 bg-rose-50'; card.innerHTML = `<h5 class="font-bold text-rose-800">${sanitizeHTML(eq.equipment_id)}</h5><p class="text-sm text-slate-700 mt-1"><span class="font-semibold">เหตุผล:</span> ${sanitizeHTML(eq.reason)}</p><p class="text-sm text-slate-700 mt-1"><span class="font-semibold">ข้อเสนอแนะ:</span> ${sanitizeHTML(eq.recommendation)}</p>`; concerningList.appendChild(card); }); } else { concerningList.innerHTML = `<p class="text-sm text-slate-500">ไม่พบอุปกรณ์ที่น่าเป็นห่วงเป็นพิเศษในขณะนี้</p>`; } concerningDiv.appendChild(concerningList); fragment.appendChild(concerningDiv); const positiveDiv = document.createElement('div'); positiveDiv.innerHTML = `<h4 class="font-semibold text-lg text-emerald-700 mb-2">✅ จุดเด่นและข่าวดี</h4><p class="text-slate-600 text-sm">${sanitizeHTML(data.positive_highlights)}</p>`; fragment.appendChild(positiveDiv); resultContainer.appendChild(fragment); }
        async function handleGenerateHandoverReport() { const resultContainer = handoverModal.querySelector('#handover-result-container'); const copyBtn = handoverModal.querySelector('#copy-handover-btn'); const hours = parseInt(handoverModal.querySelector('#handover-hours').value, 10); resultContainer.innerHTML = '<p class="text-center text-slate-500">กำลังรวบรวมข้อมูลและสร้างรายงาน...</p>'; copyBtn.classList.add('hidden'); try { const now = Date.now(); const startTime = now - (hours * 60 * 60 * 1000); const recentLogs = getAllLogsFlat().filter(log => log.timestamp >= startTime); if (recentLogs.length === 0) { throw new Error(`ไม่พบข้อมูลปัญหาในช่วง ${hours} ชั่วโมงที่ผ่านมา`); } const dataContext = JSON.stringify(stripImageField(recentLogs)); const prompt = `คุณคือหัวหน้ากะฝ่ายผลิตที่กำลังเขียนรายงานสรุปเพื่อส่งมอบงานให้กะต่อไป ข้อมูลดิบของเหตุการณ์ที่เกิดขึ้นในช่วง ${hours} ชั่วโมงที่ผ่านมาอยู่ในรูปแบบ JSON นี้: ${dataContext}. โปรดสรุปข้อมูลทั้งหมดให้อยู่ในรูปแบบรายงานส่งมอบงาน แบ่งเป็นหัวข้อ: 1. สรุปภาพรวม 2. ปัญหาใหม่ที่ต้องติดตามด่วน (Open) 3. งานที่กำลังดำเนินการ (In Progress) 4. งานที่เสร็จสิ้น (Closed) 5. ข้อควรระวัง/ข้อสั่งการพิเศษ ตอบกลับเป็นภาษาไทย จัดรูปแบบด้วย Markdown`; const contents = [{ role: 'user', parts: [{ text: prompt }] }]; const resultText = await callGeminiAPI(contents); let htmlResult = sanitizeHTML(resultText).replace(/(\*\*|__)(.*?)\1/g, '<strong>$2</strong>').replace(/\n/g, '<br>').replace(/### (.*?)<br>/g, '<h3 class="text-lg font-bold text-slate-800 mt-4 mb-2">$1</h3>').replace(/## (.*?)<br>/g, '<h2 class="text-xl font-bold text-slate-800 mt-4 mb-2">$1</h2>').replace(/\* (.*?)<br>/g, '<li class="ml-4 list-disc">$1</li>'); resultContainer.innerHTML = `<div class="text-sm text-slate-700">${htmlResult}</div>`; resultContainer.dataset.rawText = resultText; copyBtn.classList.remove('hidden'); } catch (error) { resultContainer.innerHTML = `<p class="text-center text-rose-500">เกิดข้อผิดพลาด: ${error.message}</p>`; } }

        function checkNotifications() { const allPlantLogs = getAllLogsFlat(); if (allPlantLogs.length < 5) return; const openTasks = allPlantLogs.filter(log => log.status === 'Open'); if (openTasks.length > 5) { showToast(`🔔 แจ้งเตือน: มีงานค้างสถานะ 'Open' อยู่ ${openTasks.length} รายการ`); return; } const problemCounts = allPlantLogs.reduce((acc, log) => { if (log.equipment && log.details) { const key = `${log.equipment}|${log.details.toLowerCase().substring(0, 30)}`; acc[key] = (acc[key] || 0) + 1; } return acc; }, {}); for (const key in problemCounts) { if (problemCounts[key] >= 3) { const [eqId] = key.split('|'); showToast(`⚠️ แจ้งเตือน: อุปกรณ์ ${eqId} อาจมีปัญหาเรื้อรัง`); return; } } }

        async function handleExportData() { const dataToExport = { [CONFIG.get('selectedPlant')]: localStorage.getItem(CONFIG.get('selectedPlant')) }; dataToExport[CONFIG.get('equipment_list')] = await dbManager.get(CONFIG.get('equipment_list')); for(let i=1; i<=3; i++) { const logs = await dbManager.get(CONFIG.get(`logs_plant_${i}`)); if (logs) dataToExport[CONFIG.get(`logs_plant_${i}`)] = logs; } const dataString = JSON.stringify(dataToExport, null, 2); const blob = new Blob([dataString], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `spa_data_backup_${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(a.href); showToast("ส่งออกข้อมูลทั้งหมดสำเร็จ!"); }
        function convertV8BackupToV17(data) {
            const getCategoryFromTag = (tag) => {
                const t = (tag || '').toUpperCase();
                if (/^(PP-|TP-|PX-)/.test(t)) return 'PUMP';
                if (/^PJ-/.test(t)) return 'AGITATOR';
                if (/^PC-/.test(t)) return 'BLOWER, COMP.';
                if (/^(PM-|PTK-|TTK-|PW-)/.test(t)) return 'SEPARATOR, FILTER';
                if (/^(PZ-|TZ-)/.test(t)) return 'ROTARY VALVE';
                if (/^(PS-|FC-|TC-|LC-|PC-|LI-|FI-|TI-)/.test(t)) return 'EI';
                return 'STATIC';
            };
            const mapStatus = (s) => s === 'Repair' ? 'Open' : s === 'Warning' ? 'In Progress' : 'Closed';
            const mapProblemType = (cat) => { const m = { 'Mechanic': 'Mechanical', 'Mechanical': 'Mechanical', 'Electrical': 'Electrical', 'Instrumentation': 'Instrumentation', 'Process': 'Process', 'Safety': 'Safety', 'Operation': 'Process' }; return m[cat] || 'Other'; };

            const equipmentList = JSON.parse(JSON.stringify(CONFIG.defaultEquipment));
            const logs = {};
            const plantLogs = {};

            (data.equipment || []).forEach(eq => {
                const tag = (eq.tag || '').trim();
                if (!tag) return;
                const plantId = eq.plantId || 1;
                const cat = getCategoryFromTag(tag);
                if (!equipmentList[cat]) equipmentList[cat] = [];
                if (!equipmentList[cat].includes(tag)) equipmentList[cat].push(tag);
                if (eq.notes) {
                    const ts = eq.updatedAt ? new Date(eq.updatedAt).getTime() : Date.now();
                    const entry = { timestamp: ts, date: eq.updatedAt ? eq.updatedAt.slice(0, 16) : new Date().toISOString().slice(0, 16), shift: 'A', problemType: mapProblemType(eq.category || eq.department), details: (eq.notes || '') + (eq.lastRootCause ? '\n\n[Root Cause] ' + eq.lastRootCause : ''), recorder: eq.department || '', status: mapStatus(eq.status), image: eq.imageData || null };
                    if (!plantLogs[plantId]) plantLogs[plantId] = {};
                    if (!plantLogs[plantId][tag]) plantLogs[plantId][tag] = [];
                    plantLogs[plantId][tag].push(entry);
                }
            });

            const result = {};
            result[CONFIG.get('equipment_list')] = equipmentList;
            for (const pid in plantLogs) { result[CONFIG.get(`logs_plant_${pid}`)] = plantLogs[pid]; }
            return result;
        }

        function handleImportData(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { let importedData = JSON.parse(e.target.result); if (importedData.equipment && Array.isArray(importedData.equipment) && !Object.keys(importedData).some(key => key.startsWith(CONFIG.appPrefix))) { importedData = convertV8BackupToV17(importedData); } if (!Object.keys(importedData).some(key => key.startsWith(CONFIG.appPrefix))) { throw new Error("ไฟล์ข้อมูลไม่ถูกต้องหรือไม่ตรงกับเวอร์ชันของแอป"); } showConfirmModal('คุณแน่ใจหรือไม่ที่จะนำเข้าข้อมูล? ข้อมูลปัจจุบันทั้งหมดจะถูกเขียนทับ!', async () => { await dbManager.clear(); for (const key in importedData) { if (key.includes('api_key') || key.includes('selectedPlant')) { localStorage.setItem(key, importedData[key]); } else if (key.startsWith(CONFIG.appPrefix)) { await dbManager.set(key, importedData[key]); } } localStorage.setItem('spa_v17_migrated_to_idb', 'true'); showToast("นำเข้าข้อมูลสำเร็จ! แอปจะทำการรีโหลด"); setTimeout(() => location.reload(), 1500); }); } catch (error) { showToast(`เกิดข้อผิดพลาดในการนำเข้า: ${error.message}`, true); } finally { event.target.value = ''; } }; reader.readAsText(file); }

        function openImportModal() { importModal.innerHTML = importModalTemplate.innerHTML; importModal.classList.remove('hidden'); importModal.querySelector('#close-import-btn').addEventListener('click', () => importModal.classList.add('hidden')); importModal.querySelector('#import-file-input').addEventListener('change', handleExcelFileSelect); importModal.querySelector('#confirm-import-btn').addEventListener('click', handleConfirmImport); importModal.querySelector('#import-sheet-selector').addEventListener('change', updateConfirmBtnState); importModal.querySelector('#import-shift-selector').addEventListener('change', updateConfirmBtnState); }
        function updateConfirmBtnState() { const confirmBtn = importModal.querySelector('#confirm-import-btn'); const sheet = importModal.querySelector('#import-sheet-selector').value; const shift = importModal.querySelector('input[name="shift-option"]:checked'); confirmBtn.disabled = !(sheet && shift); }
        function handleExcelFileSelect(event) { const file = event.target.files[0]; if (!file) return; const sheetSelector = importModal.querySelector('#import-sheet-selector'); const shiftRadios = importModal.querySelectorAll('input[name="shift-option"]'); const confirmBtn = importModal.querySelector('#confirm-import-btn'); const reader = new FileReader(); reader.onload = (e) => { try { const data = new Uint8Array(e.target.result); excelWorkbook = XLSX.read(data, { type: 'array' }); sheetSelector.innerHTML = '<option value="">-- เลือกชีต --</option>'; excelWorkbook.SheetNames.forEach(sheetName => { const option = document.createElement('option'); option.value = sheetName; option.textContent = sheetName; sheetSelector.appendChild(option); }); sheetSelector.disabled = false; shiftRadios.forEach(radio => radio.disabled = false); showToast("อ่านไฟล์ Excel สำเร็จ! กรุณาเลือกชีตและกะ"); } catch (error) { showToast("ไฟล์ Excel ไม่ถูกต้องหรือไม่สามารถอ่านได้", true); excelWorkbook = null; sheetSelector.disabled = true; shiftRadios.forEach(radio => radio.disabled = true); confirmBtn.disabled = true; } }; reader.readAsArrayBuffer(file); }
        function handleConfirmImport() { const sheetName = importModal.querySelector('#import-sheet-selector').value; const shiftType = importModal.querySelector('input[name="shift-option"]:checked').value; if (!excelWorkbook || !sheetName || !shiftType) { showToast("ข้อมูลไม่ครบถ้วน กรุณาเลือกไฟล์, ชีต, และกะ", true); return; } try { const worksheet = excelWorkbook.Sheets[sheetName]; const jsonSheet = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" }); const getCellValue = (cellRef) => { const cell = worksheet[cellRef]; return cell ? cell.w || cell.v : ''; }; const dateValue = getCellValue(CONFIG.excelDataMap.date); const shiftCellRef = shiftType === 'day' ? CONFIG.excelDataMap.shiftDay : CONFIG.excelDataMap.shiftNight; const shiftRawValue = getCellValue(shiftCellRef); const { shift, recorder } = parseShiftAndRecorder(shiftRawValue); let details = ''; const selectedRange = shiftType === 'day' ? CONFIG.excelDataMap.dayDetails : CONFIG.excelDataMap.nightDetails; for (let i = selectedRange.start; i <= selectedRange.end; i++) { const row = jsonSheet[i]; if (row && row.length > 0) { const rowText = row.map((cell, index) => { const text = String(cell).trim(); if (index === 0 && /^\d{1,2}:\d{2}/.test(text)) { return `${text} -`; } return text; }).filter(text => text !== '').join(' '); if (rowText) { details += `${rowText}\n`; } } } const form = views.detail.querySelector('#log-form'); form.querySelector('#log-date').value = `${excelDateToJSDate(dateValue)}T00:00`; form.querySelector('#log-shift').value = shift; form.querySelector('#log-recorder').value = recorder; form.querySelector('#log-details').value = details.trim(); form.querySelector('#log-status').value = 'Open'; showToast("นำเข้าข้อมูลลงในฟอร์มเรียบร้อยแล้ว!"); importModal.classList.add('hidden'); } catch (error) { showToast("เกิดข้อผิดพลาดระหว่างการประมวลผลข้อมูลจากชีต", true); } }
        function parseShiftAndRecorder(cellValue) { if (!cellValue || typeof cellValue !== 'string') return { shift: '', recorder: '' }; const parts = cellValue.trim().split(/\s+/); const shift = parts[0] || ''; const recorder = parts.slice(1).join(' ') || ''; return { shift, recorder }; }
        function excelDateToJSDate(excelDate) { if (typeof excelDate === 'number') { const utc_days = Math.floor(excelDate - 25569); const date = new Date(utc_days * 86400000); const year = date.getUTCFullYear(); const month = String(date.getUTCMonth() + 1).padStart(2, '0'); const day = String(date.getUTCDate()).padStart(2, '0'); return `${year}-${month}-${day}`; } if (typeof excelDate === 'string') { const parts = excelDate.match(/(\d+)[/-](\d+)[/-](\d+)/); if (parts) { let year, month, day; if (parts[1].length === 4) { [ , year, month, day] = parts; } else { [ , day, month, year] = parts; } if (year.length === 2) year = `20${year}`; if (parseInt(year, 10) > 2500) year = String(parseInt(year, 10) - 543); return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`; } } return new Date().toISOString().split('T')[0]; }

        async function initialize() {
            const savedPlant = localStorage.getItem(CONFIG.get('selectedPlant'));
            if (savedPlant) { currentPlant = parseInt(savedPlant, 10); }
            plantSelector.value = currentPlant;
            document.getElementById('last-entry-display').innerHTML = '<div class="skeleton w-full h-4 rounded"></div>'; document.getElementById('equipment-grid').innerHTML = Array.from({length:6}).map(() => '<div class="neumorphic-card p-3"><div class="skeleton mb-3 w-2/3"></div>' + Array.from({length:5}).map(() => '<div class="skeleton mt-2 w-full" style="height:10px"></div>').join('') + '</div>').join('');
            try { await dbManager.init(); await migrateDataIfNeeded(); await loadData(); } catch (err) { console.error("Database Initialization Error:", err); allLogs = {}; equipmentList = JSON.parse(JSON.stringify(CONFIG.defaultEquipment)); showToast(`เกิดข้อผิดพลาดในการโหลดฐานข้อมูล: ${err.message || err}`, true); }
            renderMainMenu();
            switchView('mainMenu');
            checkNotifications();
            document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === '.') { e.preventDefault(); renderApiKeyModal(); } });
        }

        initialize();
    });
